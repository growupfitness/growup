<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow Up Fitness - Ultimate E-Store</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', 'Segoe UI', sans-serif; }
        
        /* 🏋️‍♂️ Dynamic HD GitHub Local Image Background Solution */
        body { 
            background-image: linear-gradient(rgba(10, 16, 26, 0.85), rgba(7, 11, 18, 0.92)), 
                              url('gym-bg.jpg'); /* Aapki uploaded file ka naam */
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-blend-mode: multiply;
            background-color: #0a101a;
            color: #ffffff; 
            padding: 40px 20px; 
            min-height: 100vh; 
            letter-spacing: 0.5px;
        }
        
        /* Glowing Header Banner Section */
        header { 
            text-align: center; 
            margin-bottom: 40px; 
            position: relative;
        }
        header img { 
            max-width: 200px; 
            filter: drop-shadow(0 0 20px rgba(0, 162, 255, 0.8));
            transition: 0.5s;
        }
        header img:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.9));
        }
        
        /* Futuristic Navigation Bar (Glassmorphism Tabs) */
        .navbar { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin: 0 auto 40px auto; 
            background: rgba(13, 20, 33, 0.85); 
            backdrop-filter: blur(20px); 
            padding: 10px; 
            border-radius: 50px; 
            border: 1px solid rgba(0, 162, 255, 0.3); 
            max-width: 450px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.7);
        }
        .navbar a { 
            color: #8fa0b5; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 13px; 
            padding: 12px 24px; 
            border-radius: 25px; 
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .navbar a:hover { 
            color: #ffffff; 
            background: rgba(0, 162, 255, 0.15); 
        }
        .active-nav { 
            background: linear-gradient(135deg, #0072ff, #00f2fe) !important; 
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5); 
            color: #ffffff !important; 
        }

        /* Advanced Brand Filter Category Layout */
        .filter-section { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            flex-wrap: wrap; 
            max-width: 1100px; 
            margin: 0 auto 40px auto; 
        }
        .filter-btn { 
            background: rgba(13, 20, 33, 0.9); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); 
            color: #92a1b3; 
            padding: 10px 22px; 
            font-weight: 700; 
            font-size: 12px; 
            border-radius: 30px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .filter-btn:hover, .filter-btn.active-filter { 
            border-color: #00f2fe; 
            color: #ffffff; 
            background: rgba(0, 242, 254, 0.2); 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); 
        }

        /* Advanced Premium Showcase Grid */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); 
            gap: 35px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        /* Ultra Premium Cyber-Glow Card with Deep Glass Effect */
        .product-card { 
            background: linear-gradient(145deg, rgba(18, 25, 38, 0.94), rgba(10, 14, 23, 0.98)); 
            backdrop-filter: blur(15px);
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.07); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            position: relative; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .product-card:hover { 
            border-color: rgba(0, 242, 254, 0.6); 
            box-shadow: 0 20px 40px rgba(0, 162, 255, 0.3), 0 0 30px rgba(0, 242, 254, 0.2); 
            transform: translateY(-8px); 
        }
        
        /* High Energy Discount Tag */
        .discount-tag { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            background: linear-gradient(135deg, #ff0844, #ffb199); 
            color: white; 
            padding: 6px 14px; 
            font-size: 11px; 
            font-weight: 800; 
            border-radius: 8px; 
            z-index: 10; 
            letter-spacing: 0.5px; 
            box-shadow: 0 5px 15px rgba(255,8,68,0.4); 
        }
        
        /* Image Showcase Box */
        .image-container { 
            position: relative; 
            width: 100%; 
            height: 270px; 
            background: #090b10; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            border-bottom: 1px solid rgba(255,255,255,0.02); 
        }
        .product-img { 
            max-width: 80%; 
            max-height: 80%; 
            object-fit: contain; 
            display: none; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.7)); 
            transition: 0.4s; 
        }
        .product-img.active { 
            display: block; 
        }
        .product-card:hover .product-img {
            transform: scale(1.06);
        }
        
        /* Slide Dots */
        .slider-dots { position: absolute; bottom: 15px; left: 0; right: 0; text-align: center; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 50%; margin: 0 5px; display: inline-block; cursor: pointer; transition: 0.3s; }
        .dot.active { background: #00f2fe; box-shadow: 0 0 10px #00f2fe; transform: scale(1.4); }
        
        /* Premium Typography Details */
        .product-details { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; }
        .brand-name { color: #00f2fe; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; text-shadow: 0 0 10px rgba(0,242,254,0.2); }
        .product-title { font-size: 17px; font-weight: 700; margin-bottom: 12px; min-height: 48px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #ffffff; }
        .weight-tag { font-size: 12px; color: #6f8299; margin-bottom: 20px; font-weight: 600; }
        
        /* Cyberpunk Pricing Layout */
        .price-box { display: flex; align-items: baseline; gap: 10px; margin-bottom: 22px; margin-top: auto; }
        .selling-price { font-size: 24px; font-weight: 800; color: #00ff88; text-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .mrp-price { font-size: 14px; color: #6f8299; text-decoration: line-through; font-weight: 500; }
        
        /* Neon-Glow Premium Action Buttons */
        .buy-btn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #0072ff, #00f2fe); 
            color: white; 
            border: none; 
            font-size: 13px; 
            font-weight: 800; 
            border-radius: 10px; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            text-transform: uppercase; 
            transition: 0.3s; 
            letter-spacing: 1px; 
            box-shadow: 0 5px 20px rgba(0,114,255,0.4); 
        }
        .buy-btn:hover { 
            background: linear-gradient(135deg, #00f2fe, #0072ff); 
            box-shadow: 0 8px 25px rgba(0,242,254,0.6); 
            transform: translateY(-2px); 
        }
        .out-of-stock { background: #1c2330 !important; color: #4e5d73 !important; cursor: not-allowed; box-shadow: none !important; border: 1px solid rgba(255,255,255,0.03); }
        
        /* Shimmer Syncing Status */
        #loading { text-align: center; font-size: 15px; color: #00f2fe; margin-top: 80px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,242,254,0.3); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/growupfitness/growup/main/logo.png" alt="Grow Up Fitness Logo" onerror="this.style.display='none';">
    </header>

    <div class="navbar">
        <a href="index.html">📋 Inquiry Form</a>
        <a href="store.html" class="active-nav">🛍️ Store Catalog</a>
    </div>

    <div class="filter-section" id="filterContainer" style="display: none;">
        <button class="filter-btn active-filter" onclick="filterProducts('All', this)">All Supplements</button>
    </div>

    <div id="loading">Establishing Secure Connection to Inventory Sheets...</div>
    <div class="products-grid" id="productsContainer"></div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbzd3hMZ8aNAG0QOQoKYVtx3e7kOFtAaCBWEPE2YUtB1v1sK5WPRXdfbygQlfVpBmZm99w/exec';
    let allProductsData = [];

    function cleanDriveUrl(url) {
        if (!url) return '';
        url = url.trim();
        if (url.includes('drive.google.com/uc?')) return url;
        var id = '';
        if (url.includes('id=')) {
            id = url.split('id=')[1].split('&')[0];
        } else if (url.includes('/d/')) {
            id = url.split('/d/')[1].split('/')[0];
        }
        if (id) return 'https://drive.google.com/uc?export=view&id=' + id;
        return url;
    }

    function renderCards(products) {
        const container = document.getElementById('productsContainer');
        container.innerHTML = '';
        
        products.forEach((prod, index) => {
            const mrp = parseFloat(prod.MRP || 0);
            const sp = parseFloat(prod["Selling Price"] || 0);
            let discountPercent = 0;
            if(mrp > sp && mrp > 0) {
                discountPercent = Math.round(((mrp - sp) / mrp) * 100);
            }

            const img1 = cleanDriveUrl(prod["Image 1"]);
            const img2 = cleanDriveUrl(prod["Image 2"]);
            const img3 = cleanDriveUrl(prod["Image 3"]);

            const fallbackGraphic = `https://via.placeholder.com/400x400/0d0f14/00f2fe?text=${encodeURIComponent(prod.Brand || 'GrowUp')}+Premium`;

            let imagesHtml = `<img src="${img1}" class="product-img active img-set-${index}" data-idx="0" onerror="this.src='${fallbackGraphic}';">`;
            let dotsHtml = `<span class="dot active" onclick="switchImg(${index}, 0)"></span>`;
            
            if(prod["Image 2"]) {
                imagesHtml += `<img src="${img2}" class="product-img img-set-${index}" data-idx="1" onerror="this.style.display='none';">`;
                dotsHtml += `<span class="dot" onclick="switchImg(${index}, 1)"></span>`;
            }
            if(prod["Image 3"]) {
                imagesHtml += `<img src="${img3}" class="product-img img-set-${index}" data-idx="2" onerror="this.style.display='none';">`;
                dotsHtml += `<span class="dot" onclick="switchImg(${index}, 2)"></span>`;
            }

            const whatsappNo = "919571214461";
            const msg = encodeURIComponent(`⚡ *NEW ORDER INQUIRY* ⚡\n\n🔹 *Brand:* ${prod.Brand}\n🔹 *Product:* ${prod["Product Name"]}\n🔹 *Size/Weight:* ${prod["Weight / Size"]}\n🔹 *Deal Price:* ₹${prod["Selling Price"]}\n\nKindly confirm dispatch timelines.`);
            const waLink = `https://wa.me/${whatsappNo}?text=${msg}`;

            const isStock = prod["Stock Status"] === "In Stock" || prod["Stock Status"] === "";

            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-brand', prod.Brand || '');
            card.innerHTML = `
                ${discountPercent > 0 ? `<div class="discount-tag">${discountPercent}% OFF</div>` : ''}
                <div class="image-container">
                    ${imagesHtml}
                    <div class="slider-dots" style="${!prod["Image 2"] ? 'display:none;' : ''}">${dotsHtml}</div>
                </div>
                <div class="product-details">
                    <span class="brand-name">${prod.Brand || 'Premium Tier'}</span>
                    <h3 class="product-title">${prod["Product Name"]}</h3>
                    <span class="weight-tag">📦 Net Weight: ${prod["Weight / Size"] || 'Standard'}</span>
                    <div class="price-box">
                        <span class="selling-price">₹${prod["Selling Price"] || '0'}</span>
                        ${mrp > sp ? `<span class="mrp-price">₹${prod.MRP}</span>` : ''}
                    </div>
                    ${isStock ? 
                        `<a href="${waLink}" target="_blank" class="buy-btn">⚡ INITIATE PURCHASE</a>` : 
                        `<button class="buy-btn out-of-stock" disabled>BATCH SOLD OUT</button>`
                    }
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filterProducts(brandName, btnElement) {
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => btn.classList.remove('active-filter'));
        btnElement.classList.add('active-filter');

        if(brandName === 'All') {
            renderCards(allProductsData);
        } else {
            const filtered = allProductsData.filter(p => p.Brand === brandName);
            renderCards(filtered);
        }
    }

    function generateFilters(products) {
        const filterContainer = document.getElementById('filterContainer');
        const uniqueBrands = [...new Set(products.map(p => p.Brand).filter(b => b))];
        
        uniqueBrands.forEach(brand => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.innerText = brand;
            btn.onclick = function() { filterProducts(brand, btn); };
            filterContainer.appendChild(btn);
        });
        filterContainer.style.display = 'flex';
    }

    fetch(apiURL)
        .then(res => res.json())
        .then(products => {
            document.getElementById('loading').style.display = 'none';
            allProductsData = products;
            generateFilters(products);
            renderCards(products);
        })
        .catch(err => {
            document.getElementById('loading').innerText = 'Data Sync Pipeline Interrupted.';
            console.error(err);
        });

    function switchImg(cardIdx, imgIdx) {
        const imgs = document.querySelectorAll(`.img-set-${cardIdx}`);
        imgs.forEach(img => img.classList.remove('active'));
        imgs.forEach(img => {
            if(parseInt(img.getAttribute('data-idx')) === imgIdx) img.classList.add('active');
        });
        
        const cardDots = imgs[0].parentElement.querySelectorAll('.dot');
        cardDots.forEach(dot => dot.classList.remove('active'));
        if(cardDots[imgIdx]) cardDots[imgIdx].classList.add('active');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow Up Fitness - Premium E-Store</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', 'Segoe UI', sans-serif; }
        
        /* 🏋️‍♂️ Immersive Shopify Parallax Background Concept */
        body { 
            background-image: linear-gradient(rgba(10, 16, 26, 0.45), rgba(7, 11, 18, 0.75)), 
                              url('https://i.postimg.cc/SxHN50tQ/gym-bg.jpg'); 
            background-size: cover;
            background-position: center 15%; 
            background-repeat: no-repeat;
            background-attachment: scroll; /* Smooth parallax movement along with track */
            background-color: #070b12;
            color: #ffffff; 
            min-height: 100vh; 
            letter-spacing: 0.5px;
            overflow-x: hidden;
        }

        /* 📱 Mobile Parallax Setup */
        @media (max-width: 768px) {
            body {
                background-position: 78% 15% !important;
                background-attachment: scroll !important;
            }
        }

        /* 🎯 Floating Transparent Header */
        header {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(13, 20, 33, 0.7);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area img {
            max-width: 160px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 162, 255, 0.4));
            transition: transform 0.3s ease;
        }
        .logo-area img:hover { transform: scale(1.03); }

        /* Sleek Modern Header Navigation Tabs */
        .header-tabs {
            display: flex;
            gap: 10px;
        }
        .header-tabs a {
            color: #b0c2d9;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            padding: 10px 20px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .header-tabs a:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }
        .header-tabs a.active-tab {
            background: linear-gradient(135deg, #0072ff, #00f2fe);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        /* Main Container */
        .wrapper {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Dynamic Filter Hub */
        .category-hub {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .hub-btn {
            background: rgba(13, 20, 33, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #8fa0b5;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 12px;
            border-radius: 40px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .hub-btn:hover, .hub-btn.active-hub {
            border-color: #00f2fe;
            color: #ffffff;
            background: rgba(0, 242, 254, 0.15);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        /* 💎 Shopify Single Product Split Row Architecture */
        .shopify-split-row {
            display: flex;
            background: linear-gradient(145deg, rgba(18, 25, 38, 0.85), rgba(10, 14, 23, 0.92));
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 50px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: transform 0.4s ease, border-color 0.4s ease;
        }
        .shopify-split-row:hover {
            border-color: rgba(0, 242, 254, 0.4);
            transform: translateY(-4px);
        }

        /* Left Side: Product Image Display Panel */
        .split-media-panel {
            flex: 1.1;
            background: #090b10;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
            min-height: 480px;
            border-right: 1px solid rgba(255, 255, 255, 0.04);
        }
        .showcase-img {
            max-width: 85%;
            max-height: 400px;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8));
            display: none;
            transition: transform 0.4s ease;
        }
        .showcase-img.active { display: block; }
        .shopify-split-row:hover .showcase-img { transform: scale(1.03); }

        /* Media Controller Dots */
        .panel-dots { position: absolute; bottom: 20px; display: flex; gap: 8px; }
        .p-dot { width: 7px; height: 7px; background: rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .p-dot.active { background: #00f2fe; transform: scale(1.3); box-shadow: 0 0 8px #00f2fe; }

        /* Right Side: Professional Context Details Panel */
        .split-info-panel {
            flex: 1;
            padding: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .item-tag-line {
            color: #00f2fe;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .item-main-title {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.3;
            color: #ffffff;
            margin-bottom: 15px;
        }
        .spec-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            color: #a4b3c6;
            border-radius: 8px;
            width: fit-content;
            margin-bottom: 25px;
        }

        /* Shopify Style Pricing & Discounts */
        .pricing-hub {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
        .deal-price { font-size: 32px; font-weight: 800; color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.15); }
        .retail-price { font-size: 16px; color: #6f8299; text-decoration: line-through; font-weight: 500; }
        .save-badge {
            background: linear-gradient(135deg, #ff0844, #ffb199);
            color: white;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 6px;
        }

        /* Shopify Call-To-Action Button */
        .shopify-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0072ff, #00f2fe);
            color: #ffffff;
            border: none;
            font-size: 14px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(0,114,255,0.3);
        }
        .shopify-btn:hover {
            background: linear-gradient(135deg, #00f2fe, #0072ff);
            box-shadow: 0 8px 25px rgba(0,242,254,0.5);
            transform: translateY(-2px);
        }
        .sold-out { background: #1c2330 !important; color: #4e5d73 !important; cursor: not-allowed; box-shadow: none !important; }

        /* Mobile View Optimization */
        @media (max-width: 900px) {
            .shopify-split-row { flex-direction: column; }
            .split-media-panel { min-height: 350px; }
            .split-info-panel { padding: 30px; }
            .item-main-title { font-size: 22px; }
        }

        #loading { text-align: center; font-size: 15px; color: #00f2fe; margin-top: 100px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo-area">
            <a href="index.html">
                <img src="logo.png" alt="Grow Up Fitness Logo" onerror="this.src='https://raw.githubusercontent.com/growupfitness/growup/main/logo.png';">
            </a>
        </div>
        <div class="header-tabs">
            <a href="index.html">📋 Form</a>
            <a href="premium-store.html" class="active-tab">🛍️ Elite Store</a>
        </div>
    </header>

    <div class="wrapper">
        <div class="category-hub" id="hubContainer" style="display: none;">
            <button class="hub-btn active-hub" onclick="filterHub('All', this)">All Products</button>
        </div>

        <div id="loading">Syncing Luxury Digital Pipeline...</div>
        <div id="shopifyStoreContainer"></div>
    </div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbzd3hMZ8aNAG0QOQoKYVtx3e7kOFtAaCBWEPE2YUtB1v1sK5WPRXdfbygQlfVpBmZm99w/exec';
    let rawStoreDatabase = [];

    function cleanDriveUrl(url) {
        if (!url) return '';
        url = url.trim();
        if (url.includes('drive.google.com/uc?')) return url;
        var id = '';
        if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
        else if (url.includes('/d/')) id = url.split('/d/')[1].split('/')[0];
        return id ? 'https://drive.google.com/uc?export=view&id=' + id : url;
    }

    function renderShopifyRows(products) {
        const container = document.getElementById('shopifyStoreContainer');
        container.innerHTML = '';

        const activeSupplements = products.filter(p => p.Brand && p.Brand.toUpperCase() !== 'BACKGROUND');

        activeSupplements.forEach((prod, rowIndex) => {
            const mrp = parseFloat(prod.MRP || 0);
            const sp = parseFloat(prod["Selling Price"] || 0);
            let discountPercent = (mrp > sp && mrp > 0) ? Math.round(((mrp - sp) / mrp) * 100) : 0;

            const img1 = cleanDriveUrl(prod["Image 1"]);
            const img2 = cleanDriveUrl(prod["Image 2"]);
            const img3 = cleanDriveUrl(prod["Image 3"]);
            const fallback = `https://via.placeholder.com/400x400/0d0f14/00f2fe?text=${encodeURIComponent(prod.Brand || 'GrowUp')}`;

            let mediaHtml = `<img src="${img1}" class="showcase-img active row-img-${rowIndex}" data-imgidx="0" onerror="this.src='${fallback}';">`;
            let dotsHtml = `<span class="p-dot active" onclick="jumpToImage(${rowIndex}, 0)"></span>`;

            if(prod["Image 2"]) {
                mediaHtml += `<img src="${img2}" class="showcase-img row-img-${rowIndex}" data-imgidx="1">`;
                dotsHtml += `<span class="p-dot" onclick="jumpToImage(${rowIndex}, 1)"></span>`;
            }
            if(prod["Image 3"]) {
                mediaHtml += `<img src="${img3}" class="showcase-img row-img-${rowIndex}" data-imgidx="2">`;
                dotsHtml += `<span class="p-dot" onclick="jumpToImage(${rowIndex}, 2)"></span>`;
            }

            const waNo = "919571214461";
            const message = encodeURIComponent(`🔥 *ELITE SHOPIFY ORDER* 🔥\n\n⚡ *Brand:* ${prod.Brand}\n⚡ *Product:* ${prod["Product Name"]}\n⚡ *Size:* ${prod["Weight / Size"]}\n⚡ *Exclusive Price:* ₹${prod["Selling Price"]}`);
            const orderLink = `https://wa.me/${waNo}?text=${message}`;
            const inStock = prod["Stock Status"] === "In Stock" || prod["Stock Status"] === "";

            const splitRow = document.createElement('div');
            splitRow.className = 'shopify-split-row';
            splitRow.innerHTML = `
                <div class="split-media-panel">
                    ${mediaHtml}
                    <div class="panel-dots" style="${!prod["Image 2"] ? 'display:none;' : ''}">${dotsHtml}</div>
                </div>
                <div class="split-info-panel">
                    <span class="item-tag-line">${prod.Brand || 'Premium Tier'}</span>
                    <h2 class="item-main-title">${prod["Product Name"]}</h2>
                    <div class="spec-badge">📦 Net Content: ${prod["Weight / Size"] || 'Standard'}</div>
                    <div class="pricing-hub">
                        <span class="deal-price">₹${prod["Selling Price"] || '0'}</span>
                        ${mrp > sp ? `<span class="retail-price">₹${prod.MRP}</span><span class="save-badge">${discountPercent}% OFF</span>` : ''}
                    </div>
                    ${inStock ? 
                        `<a href="${orderLink}" target="_blank" class="shopify-btn">Add to Cart & Order</a>` : 
                        `<button class="shopify-btn sold-out" disabled>Sold Out</button>`
                    }
                </div>
            `;
            container.appendChild(splitRow);
        });
    }

    function filterHub(brandName, btn) {
        document.querySelectorAll('.hub-btn').forEach(b => b.classList.remove('active-hub'));
        btn.classList.add('active-hub');
        const activeSupplements = rawStoreDatabase.filter(p => p.Brand && p.Brand.toUpperCase() !== 'BACKGROUND');
        renderShopifyRows(brandName === 'All' ? activeSupplements : activeSupplements.filter(p => p.Brand === brandName));
    }

    function generateHubFilters(products) {
        const hub = document.getElementById('hubContainer');
        const brands = [...new Set(products.map(p => p.Brand).filter(b => b && b.toUpperCase() !== 'BACKGROUND'))];
        brands.forEach(brand => {
            const button = document.createElement('button');
            button.className = 'hub-btn';
            button.innerText = brand;
            button.onclick = function() { filterHub(brand, button); };
            hub.appendChild(button);
        });
        hub.style.display = 'flex';
    }

    fetch(apiURL)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            rawStoreDatabase = data;
            generateHubFilters(data);
            renderShopifyRows(data);
        })
        .catch(err => {
            document.getElementById('loading').innerText = 'Data Pipeline Interrupted.';
            console.error(err);
        });

    function jumpToImage(rowIdx, imgIdx) {
        const imgs = document.querySelectorAll(`.row-img-${rowIdx}`);
        imgs.forEach(img => img.classList.remove('active'));
        imgs.forEach(img => {
            if(parseInt(img.getAttribute('data-imgidx')) === imgIdx) img.classList.add('active');
        });
        const dots = imgs[0].parentElement.querySelectorAll('.p-dot');
        dots.forEach(d => d.classList.remove('active'));
        if(dots[imgIdx]) dots[imgIdx].classList.add('active');
    }
</script>
</body>
</html>
